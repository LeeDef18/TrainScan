services:
  airflow-postgres:
    image: postgres:16
    container_name: trainscan-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - airflow-internal

  airflow-init:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-init
    restart: "no"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
      AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${AIRFLOW_S3_LOG_BUCKET}/${AIRFLOW_S3_LOG_PREFIX}
      AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL}
      TRAINSCAN_API_URL: ${TRAINSCAN_API_URL}
    volumes:
      - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
      - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
      - airflow-logs:/opt/airflow/logs
      - /opt/trainscan/project:/opt/project
    networks:
      - airflow-internal
      - trainscan-shared
    command: >
      bash -c "
      airflow connections delete airflow_s3_logs >/dev/null 2>&1 || true &&
      airflow connections add airflow_s3_logs \
      --conn-type aws \
      --conn-extra '{\"endpoint_url\": \"${S3_ENDPOINT}\", \"aws_access_key_id\": \"${S3_KEY}\", \"aws_secret_access_key\": \"${S3_SECRET}\"}' &&
      airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_ADMIN_USERNAME}
      --password $${AIRFLOW_ADMIN_PASSWORD}
      --firstname Air
      --lastname Flow
      --role Admin
      --email $${AIRFLOW_ADMIN_EMAIL}
      "

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-webserver
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
      AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${AIRFLOW_S3_LOG_BUCKET}/${AIRFLOW_S3_LOG_PREFIX}
      AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
      TRAINSCAN_API_URL: ${TRAINSCAN_API_URL}
    volumes:
      - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
      - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
      - airflow-logs:/opt/airflow/logs
      - /opt/trainscan/project:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    ports:
      - "8080:8080"
    networks:
      - airflow-internal
      - trainscan-shared

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-scheduler
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD}@airflow-postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: ${AIRFLOW_BASE_URL}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
      AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${AIRFLOW_S3_LOG_BUCKET}/${AIRFLOW_S3_LOG_PREFIX}
      AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
      TRAINSCAN_API_URL: ${TRAINSCAN_API_URL}
    volumes:
      - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
      - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
      - airflow-logs:/opt/airflow/logs
      - /opt/trainscan/project:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - airflow-internal
      - trainscan-shared

volumes:
  airflow-postgres-data:
  airflow-logs:

networks:
  airflow-internal:
  trainscan-shared:
    external: true
    name: trainscan-shared
