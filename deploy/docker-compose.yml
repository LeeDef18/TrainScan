services:
  trainscan:
    image: ${IMAGE_NAME}
    container_name: trainscan-api
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - trainscan-shared

  nginx:
    image: nginx:1.27-alpine
    container_name: trainscan-nginx
    restart: unless-stopped
    depends_on:
      trainscan:
        condition: service_healthy
      trainscan-airflow-webserver:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - trainscan-shared

networks:
  trainscan-shared:
    external: true
    name: trainscan-shared
