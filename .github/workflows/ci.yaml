name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --all-groups
      - run: uv run black --check app tests
      - run: uv run isort --check-only app tests
      - run: uv run flake8 app tests
      - run: uv run pylint app --fail-under=8.0
      - run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t trainscan .
