name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leedef18/trainscan

jobs:

  lint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --group dev
      - run: uv run black --check app tests
      - run: uv run isort --check-only app tests
      - run: uv run flake8 app tests
      - run: uv run pylint app --fail-under=8.0
      - run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --group dev

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v3

      - name: Copy project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.SELECTEL_VPS_HOST }}
          username: ${{ vars.SELECTEL_VPS_USER }}
          key: ${{ secrets.SELECTEL_VPS_SSH_KEY }}
          port: ${{ vars.SELECTEL_VPS_SSH_PORT || '22' }}
          source: "orchestration/airflow,app,pyproject.toml,uv.lock,.env.example,README.md"
          target: ${{ vars.SELECTEL_APP_DIR }}/project
          overwrite: true
          strip_components: 0

      - name: Deploy to Selectel VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SELECTEL_VPS_HOST }}
          username: ${{ vars.SELECTEL_VPS_USER }}
          key: ${{ secrets.SELECTEL_VPS_SSH_KEY }}
          port: ${{ vars.SELECTEL_VPS_SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            mkdir -p ${{ vars.SELECTEL_APP_DIR }}
            mkdir -p ${{ vars.SELECTEL_APP_DIR }}/nginx
            cat > ${{ vars.SELECTEL_APP_DIR }}/.env <<'EOF'
            IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            APP_ENV=prod
            LOG_LEVEL=${{ vars.LOG_LEVEL || 'INFO' }}
            APP_HOST=0.0.0.0
            APP_PORT=${{ vars.APP_PORT || '8000' }}
            AIRFLOW_BASE_URL=${{ vars.AIRFLOW_BASE_URL || 'http://139.100.195.58/airflow' }}
            TRAINSCAN_API_URL=${{ vars.TRAINSCAN_API_URL || 'http://nginx' }}
            AIRFLOW_S3_LOG_BUCKET=${{ vars.AIRFLOW_S3_LOG_BUCKET }}
            AIRFLOW_S3_LOG_PREFIX=${{ vars.AIRFLOW_S3_LOG_PREFIX || 'trainscan-airflow' }}
            AIRFLOW_OUTPUT_BUCKET=${{ vars.AIRFLOW_OUTPUT_BUCKET }}
            AIRFLOW_DB_PASSWORD=${{ secrets.AIRFLOW_DB_PASSWORD }}
            AIRFLOW_ADMIN_USERNAME=${{ vars.AIRFLOW_ADMIN_USERNAME }}
            AIRFLOW_ADMIN_PASSWORD=${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
            AIRFLOW_ADMIN_EMAIL=${{ vars.AIRFLOW_ADMIN_EMAIL }}
            MODEL_PATH=${{ vars.MODEL_PATH }}
            MODEL_BUCKET=${{ vars.MODEL_BUCKET }}
            MODEL_KEY=${{ vars.MODEL_KEY }}
            RULE_TABLE_PATH=${{ vars.RULE_TABLE_PATH }}
            RULE_TABLE_BUCKET=${{ vars.RULE_TABLE_BUCKET }}
            RULE_TABLE_KEY=${{ vars.RULE_TABLE_KEY }}
            S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
            S3_KEY=${{ secrets.S3_KEY }}
            S3_SECRET=${{ secrets.S3_SECRET }}
            MODEL_CONF=${{ vars.MODEL_CONF }}
            MODEL_IOU=${{ vars.MODEL_IOU }}
            EOF
            mkdir -p ${{ vars.SELECTEL_APP_DIR }}/airflow
            cat > ${{ vars.SELECTEL_APP_DIR }}/airflow/docker-compose.yml <<'EOF'
            services:
              airflow-postgres:
                image: postgres:16
                container_name: trainscan-airflow-postgres
                restart: unless-stopped
                environment:
                  POSTGRES_USER: airflow
                  POSTGRES_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
                  POSTGRES_DB: airflow
                volumes:
                  - airflow-postgres-data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                networks:
                  - airflow-internal

              airflow-init:
                image: apache/airflow:2.10.0
                container_name: trainscan-airflow-init
                restart: "no"
                depends_on:
                  airflow-postgres:
                    condition: service_healthy
                env_file:
                  - ../.env
                environment:
                  AIRFLOW_HOME: /opt/airflow
                  AIRFLOW__CORE__EXECUTOR: LocalExecutor
                  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
                  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${{ secrets.AIRFLOW_DB_PASSWORD }}@airflow-postgres:5432/airflow
                  AIRFLOW_CONN_AIRFLOW_S3_LOGS: aws://?endpoint_url=${{ vars.S3_ENDPOINT }}&aws_access_key_id=${{ secrets.S3_KEY }}&aws_secret_access_key=${{ secrets.S3_SECRET }}
                  AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
                  AIRFLOW__WEBSERVER__BASE_URL: ${{ vars.AIRFLOW_BASE_URL || 'http://139.100.195.58/airflow' }}
                  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
                  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
                  AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
                  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${{ vars.AIRFLOW_S3_LOG_BUCKET }}/${{ vars.AIRFLOW_S3_LOG_PREFIX || 'trainscan-airflow' }}
                  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
                  AIRFLOW_ADMIN_USERNAME: ${{ vars.AIRFLOW_ADMIN_USERNAME }}
                  AIRFLOW_ADMIN_PASSWORD: ${{ secrets.AIRFLOW_ADMIN_PASSWORD }}
                  AIRFLOW_ADMIN_EMAIL: ${{ vars.AIRFLOW_ADMIN_EMAIL }}
                  TRAINSCAN_API_URL: ${{ vars.TRAINSCAN_API_URL || 'http://nginx' }}
                  AIRFLOW_OUTPUT_BUCKET: ${{ vars.AIRFLOW_OUTPUT_BUCKET }}
                volumes:
                  - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
                  - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
                  - /opt/trainscan/project:/opt/project
                networks:
                  - airflow-internal
                  - trainscan-shared
                command: >
                  bash -c "
                  airflow db migrate &&
                  airflow variables set AIRFLOW_OUTPUT_BUCKET '${{ vars.AIRFLOW_OUTPUT_BUCKET }}' &&
                  airflow variables set S3_ENDPOINT '${{ vars.S3_ENDPOINT }}' &&
                  airflow variables set S3_KEY '${{ secrets.S3_KEY }}' &&
                  airflow variables set S3_SECRET '${{ secrets.S3_SECRET }}' &&
                  airflow users create
                  --username $${AIRFLOW_ADMIN_USERNAME}
                  --password $${AIRFLOW_ADMIN_PASSWORD}
                  --firstname Air
                  --lastname Flow
                  --role Admin
                  --email $${AIRFLOW_ADMIN_EMAIL}
                  "

              airflow-webserver:
                image: apache/airflow:2.10.0
                container_name: trainscan-airflow-webserver
                restart: unless-stopped
                user: "0:0"
                depends_on:
                  airflow-postgres:
                    condition: service_healthy
                  airflow-init:
                    condition: service_completed_successfully
                env_file:
                  - ../.env
                environment:
                  AIRFLOW_HOME: /opt/airflow
                  AIRFLOW__CORE__EXECUTOR: LocalExecutor
                  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
                  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${{ secrets.AIRFLOW_DB_PASSWORD }}@airflow-postgres:5432/airflow
                  AIRFLOW_CONN_AIRFLOW_S3_LOGS: aws://?endpoint_url=${{ vars.S3_ENDPOINT }}&aws_access_key_id=${{ secrets.S3_KEY }}&aws_secret_access_key=${{ secrets.S3_SECRET }}
                  AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
                  AIRFLOW__WEBSERVER__BASE_URL: ${{ vars.AIRFLOW_BASE_URL || 'http://139.100.195.58/airflow' }}
                  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
                  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
                  AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
                  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${{ vars.AIRFLOW_S3_LOG_BUCKET }}/${{ vars.AIRFLOW_S3_LOG_PREFIX || 'trainscan-airflow' }}
                  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
                  TRAINSCAN_API_URL: ${{ vars.TRAINSCAN_API_URL || 'http://nginx' }}
                  AIRFLOW_OUTPUT_BUCKET: ${{ vars.AIRFLOW_OUTPUT_BUCKET }}
                volumes:
                  - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
                  - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
                  - /opt/trainscan/project:/opt/project
                  - /var/run/docker.sock:/var/run/docker.sock
                command: webserver
                networks:
                  - airflow-internal
                  - trainscan-shared

              airflow-scheduler:
                image: apache/airflow:2.10.0
                container_name: trainscan-airflow-scheduler
                restart: unless-stopped
                user: "0:0"
                depends_on:
                  airflow-postgres:
                    condition: service_healthy
                  airflow-init:
                    condition: service_completed_successfully
                env_file:
                  - ../.env
                environment:
                  AIRFLOW_HOME: /opt/airflow
                  AIRFLOW__CORE__EXECUTOR: LocalExecutor
                  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
                  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${{ secrets.AIRFLOW_DB_PASSWORD }}@airflow-postgres:5432/airflow
                  AIRFLOW_CONN_AIRFLOW_S3_LOGS: aws://?endpoint_url=${{ vars.S3_ENDPOINT }}&aws_access_key_id=${{ secrets.S3_KEY }}&aws_secret_access_key=${{ secrets.S3_SECRET }}
                  AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
                  AIRFLOW__WEBSERVER__BASE_URL: ${{ vars.AIRFLOW_BASE_URL || 'http://139.100.195.58/airflow' }}
                  AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
                  AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
                  AIRFLOW__LOGGING__REMOTE_LOGGING: "true"
                  AIRFLOW__LOGGING__REMOTE_BASE_LOG_FOLDER: s3://${{ vars.AIRFLOW_S3_LOG_BUCKET }}/${{ vars.AIRFLOW_S3_LOG_PREFIX || 'trainscan-airflow' }}
                  AIRFLOW__LOGGING__REMOTE_LOG_CONN_ID: airflow_s3_logs
                  TRAINSCAN_API_URL: ${{ vars.TRAINSCAN_API_URL || 'http://nginx' }}
                  AIRFLOW_OUTPUT_BUCKET: ${{ vars.AIRFLOW_OUTPUT_BUCKET }}
                volumes:
                  - /opt/trainscan/project/orchestration/airflow/dags:/opt/airflow/dags
                  - /opt/trainscan/project/orchestration/airflow/data:/opt/project/orchestration/airflow/data
                  - /opt/trainscan/project:/opt/project
                  - /var/run/docker.sock:/var/run/docker.sock
                command: scheduler
                networks:
                  - airflow-internal
                  - trainscan-shared

            volumes:
              airflow-postgres-data:
            networks:
              airflow-internal:
              trainscan-shared:
                external: true
                name: trainscan-shared
            EOF
            cat > ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml <<'EOF'
            services:
              trainscan:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: trainscan-api
                restart: unless-stopped
                env_file:
                  - .env
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 30s
                networks:
                  - trainscan-shared

              nginx:
                image: nginx:1.27-alpine
                container_name: trainscan-nginx
                restart: unless-stopped
                depends_on:
                  trainscan:
                    condition: service_healthy
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
                networks:
                  - trainscan-shared
            networks:
              trainscan-shared:
                external: true
                name: trainscan-shared
            EOF
            cat > ${{ vars.SELECTEL_APP_DIR }}/nginx/default.conf <<'EOF'
            upstream trainscan_api {
                server trainscan:8000;
            }

            upstream airflow_webserver {
                server trainscan-airflow-webserver:8080;
            }

            server {
                listen 80;
                listen [::]:80;
                server_name _;

                client_max_body_size 20m;

                location = /airflow {
                    return 301 /airflow/;
                }

                location ^~ /airflow/ {
                    proxy_pass http://airflow_webserver;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header X-Forwarded-Host $host;
                    proxy_set_header X-Forwarded-Port $server_port;
                    proxy_set_header X-Forwarded-Prefix /airflow;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_redirect / /airflow/;
                    proxy_read_timeout 300s;
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 300s;
                }

                location / {
                    proxy_pass http://trainscan_api;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 300s;
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 300s;
                }
            }

            EOF
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker network inspect trainscan-shared >/dev/null 2>&1 || docker network create trainscan-shared
            docker compose -f ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml pull
            docker compose -f ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml up -d
            docker compose -f ${{ vars.SELECTEL_APP_DIR }}/airflow/docker-compose.yml up -d
            docker image prune -f
