name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leedef18/trainscan

jobs:

  lint:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --all-groups
      - run: uv run black --check app tests
      - run: uv run isort --check-only app tests
      - run: uv run flake8 app tests
      - run: uv run pylint app --fail-under=8.0
      - run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    needs: lint
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Selectel VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.SELECTEL_VPS_HOST }}
          username: ${{ vars.SELECTEL_VPS_USER }}
          key: ${{ secrets.SELECTEL_VPS_SSH_KEY }}
          port: ${{ vars.SELECTEL_VPS_SSH_PORT || '22' }}
          script: |
            set -e
            mkdir -p ${{ vars.SELECTEL_APP_DIR }}
            mkdir -p ${{ vars.SELECTEL_APP_DIR }}/nginx
            cat > ${{ vars.SELECTEL_APP_DIR }}/.env <<'EOF'
            IMAGE_NAME=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            APP_ENV=prod
            LOG_LEVEL=${{ vars.LOG_LEVEL || 'INFO' }}
            APP_HOST=0.0.0.0
            APP_PORT=${{ vars.APP_PORT || '8000' }}
            MODEL_PATH=${{ vars.MODEL_PATH }}
            MODEL_BUCKET=${{ vars.MODEL_BUCKET }}
            MODEL_KEY=${{ vars.MODEL_KEY }}
            RULE_TABLE_PATH=${{ vars.RULE_TABLE_PATH }}
            RULE_TABLE_BUCKET=${{ vars.RULE_TABLE_BUCKET }}
            RULE_TABLE_KEY=${{ vars.RULE_TABLE_KEY }}
            S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
            S3_KEY=${{ secrets.S3_KEY }}
            S3_SECRET=${{ secrets.S3_SECRET }}
            MODEL_CONF=${{ vars.MODEL_CONF }}
            MODEL_IOU=${{ vars.MODEL_IOU }}
            EOF
            cat > ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml <<'EOF'
            services:
              trainscan:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: trainscan-api
                restart: unless-stopped
                env_file:
                  - .env
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
                  interval: 30s
                  timeout: 10s
                  retries: 5
                  start_period: 30s

              nginx:
                image: nginx:1.27-alpine
                container_name: trainscan-nginx
                restart: unless-stopped
                depends_on:
                  trainscan:
                    condition: service_healthy
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
            EOF
            cat > ${{ vars.SELECTEL_APP_DIR }}/nginx/default.conf <<'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name _;

                client_max_body_size 20m;

                location / {
                    proxy_pass http://trainscan:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 300s;
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 300s;
                }
            }
            EOF
            docker login ${{ env.REGISTRY }} -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml pull
            docker compose -f ${{ vars.SELECTEL_APP_DIR }}/docker-compose.yml up -d
            docker image prune -f
