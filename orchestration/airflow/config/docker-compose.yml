services:
  postgres:
    image: postgres:16
    container_name: trainscan-airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../../../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/project/orchestration/airflow/data
      - ../logs:/opt/airflow/logs
      - ../../../:/opt/project
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_ADMIN_USERNAME}
      --password $${AIRFLOW_ADMIN_PASSWORD}
      --firstname Air
      --lastname Flow
      --role Admin
      --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      "

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-webserver
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
    ports:
      - "8080:8080"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/project/orchestration/airflow/data
      - ../logs:/opt/airflow/logs
      - ../../../:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: trainscan-airflow-scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - ../../../.env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__HOSTNAME_CALLABLE: socket.getfqdn
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8080
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
      AIRFLOW__LOGGING__REMOTE_LOGGING: "false"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../data:/opt/project/orchestration/airflow/data
      - ../logs:/opt/airflow/logs
      - ../../../:/opt/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler

volumes:
  postgres-data:
